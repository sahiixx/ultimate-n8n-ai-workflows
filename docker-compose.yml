services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    env_file:
      - ./.env
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_USER_FOLDER=/home/node/.n8n
      - NODE_ENV=production
    volumes:
      - ./workflows:/home/node/.n8n/workflows
      - ./automation:/home/node/.n8n/automation
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_network

  litellm:
    image: ghcr.io/berriai/litellm:latest
    restart: always
    env_file:
      - ./.env
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      - LITELLM_CONFIG=/app/config.yaml
      - LITELLM_LOG=info
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml:ro
    networks:
      - n8n_network

volumes:
  n8n_data:

networks:
  n8n_network:
    driver: bridge
